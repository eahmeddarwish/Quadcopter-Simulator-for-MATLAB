name: Validate environment configs

on:
  push:
    paths:
      - 'environments/**'
      - 'scripts/validate_environments.py'
      - '.github/workflows/validate-environments.yml'
  pull_request:
    paths:
      - 'environments/**'
      - 'scripts/validate_environments.py'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Validate environments/*/config.json against the schema
        run: python3 scripts/validate_environments.py
